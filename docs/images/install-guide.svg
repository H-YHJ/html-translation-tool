<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="330" viewBox="0 0 1200 330" role="img" aria-labelledby="title desc">
  <title id="title">浏览器扩展安装路径</title>
  <desc id="desc">依次打开扩展管理页、开启开发人员模式、加载已解压扩展、选择包含 manifest.json 的项目根目录。</desc>
  <defs>
    <style>
      .ui { font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif; }
      .title { font-size: 24px; font-weight: 740; fill: #111827; }
      .body { font-size: 18px; fill: #64748b; }
      .number { font-size: 21px; font-weight: 800; fill: #ffffff; }
    </style>
  </defs>
  <rect width="1200" height="330" rx="22" fill="#f8fafc"/>
  <g class="ui">
    <g transform="translate(34 42)">
      <rect width="252" height="246" rx="16" fill="#ffffff" stroke="#dbe3ed" stroke-width="2"/>
      <circle cx="34" cy="34" r="18" fill="#2563eb"/>
      <text x="34" y="41" text-anchor="middle" class="number">1</text>
      <rect x="28" y="74" width="196" height="48" rx="10" fill="#eef2f7"/>
      <circle cx="50" cy="98" r="7" fill="#2563eb"/>
      <rect x="66" y="91" width="136" height="14" rx="7" fill="#cbd5e1"/>
      <text x="28" y="160" class="title">打开扩展管理页</text>
      <text x="28" y="194" class="body">edge://extensions</text>
      <text x="28" y="222" class="body">chrome://extensions</text>
    </g>
    <path d="M302 165h34m-10-10 10 10-10 10" fill="none" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <g transform="translate(350 42)">
      <rect width="220" height="246" rx="16" fill="#ffffff" stroke="#dbe3ed" stroke-width="2"/>
      <circle cx="34" cy="34" r="18" fill="#2563eb"/>
      <text x="34" y="41" text-anchor="middle" class="number">2</text>
      <rect x="28" y="80" width="78" height="38" rx="19" fill="#2563eb"/>
      <circle cx="86" cy="99" r="15" fill="#ffffff"/>
      <text x="28" y="160" class="title">开启开发者模式</text>
      <text x="28" y="194" class="body">通常位于页面右上角</text>
      <text x="28" y="222" class="body">开关变蓝即为开启</text>
    </g>
    <path d="M586 165h34m-10-10 10 10-10 10" fill="none" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <g transform="translate(634 42)">
      <rect width="220" height="246" rx="16" fill="#ffffff" stroke="#dbe3ed" stroke-width="2"/>
      <circle cx="34" cy="34" r="18" fill="#2563eb"/>
      <text x="34" y="41" text-anchor="middle" class="number">3</text>
      <rect x="28" y="80" width="164" height="42" rx="10" fill="#2563eb"/>
      <path d="M49 102h18m-9-9v18" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
      <text x="78" y="107" font-size="17" font-weight="700" fill="#ffffff">加载已解压</text>
      <text x="28" y="160" class="title">点击加载按钮</text>
      <text x="28" y="194" class="body">不要选择压缩包</text>
      <text x="28" y="222" class="body">选择解压后的文件夹</text>
    </g>
    <path d="M870 165h34m-10-10 10 10-10 10" fill="none" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <g transform="translate(918 42)">
      <rect width="248" height="246" rx="16" fill="#ffffff" stroke="#dbe3ed" stroke-width="2"/>
      <circle cx="34" cy="34" r="18" fill="#2563eb"/>
      <text x="34" y="41" text-anchor="middle" class="number">4</text>
      <path d="M30 82h62l14 14h112v54H30Z" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
      <rect x="52" y="112" width="142" height="18" rx="5" fill="#ffffff"/>
      <text x="123" y="126" text-anchor="middle" font-size="14" font-weight="700" fill="#2563eb">manifest.json</text>
      <text x="28" y="178" class="title">选择项目根目录</text>
      <text x="28" y="212" class="body">确认目录内能直接看到</text>
      <text x="28" y="240" class="body">manifest.json 文件</text>
    </g>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="780" height="1100" viewBox="0 0 780 1100" role="img" aria-labelledby="title desc">
  <title id="title">上下文翻译助手弹窗界面预览</title>
  <desc id="desc">展示翻译服务、目标语言、模型配置、术语偏好、速度模式、翻译风格和三个主要操作按钮。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .ui { font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif; fill: #111827; }
      .label { font-size: 22px; font-weight: 650; fill: #273244; }
      .value { font-size: 23px; font-weight: 500; fill: #111827; }
      .muted { font-size: 20px; fill: #64748b; }
      .field { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .divider { stroke: #dbe3ed; stroke-width: 2; }
      .buttonText { font-size: 22px; font-weight: 680; }
    </style>
  </defs>

  <rect width="780" height="1100" fill="#eef2f7"/>
  <rect x="18" y="18" width="744" height="1064" rx="24" fill="#f8fafc" filter="url(#shadow)"/>

  <g class="ui">
    <rect x="42" y="44" width="68" height="68" rx="16" fill="#2563eb"/>
    <text x="76" y="91" text-anchor="middle" font-size="42" font-weight="800" fill="#ffffff">T</text>
    <circle cx="99" cy="58" r="9" fill="#7dd3fc" stroke="#ffffff" stroke-width="4"/>
    <text x="130" y="72" font-size="32" font-weight="760">上下文翻译助手</text>
    <text x="130" y="104" class="muted">先理解网页语境，再翻译正文。</text>
    <rect x="674" y="50" width="60" height="60" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <path d="M716 72a16 16 0 0 0-25-3l-7 7m0 0h13m-13 0V63" fill="none" stroke="#475569" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="42" y="136" width="696" height="802" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>

    <text x="68" y="176" class="label">翻译服务</text>
    <text x="402" y="176" class="label">翻译为</text>
    <rect x="68" y="190" width="308" height="58" rx="12" class="field"/>
    <rect x="402" y="190" width="308" height="58" rx="12" class="field"/>
    <text x="88" y="228" class="value">自定义兼容接口</text>
    <text x="422" y="228" class="value">简体中文</text>
    <path d="M346 213l9 9 9-9" fill="none" stroke="#64748b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M680 213l9 9 9-9" fill="none" stroke="#64748b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <line x1="68" y1="272" x2="710" y2="272" class="divider"/>

    <text x="68" y="313" class="label">模型</text>
    <rect x="278" y="288" width="92" height="30" rx="7" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="2"/>
    <text x="324" y="310" text-anchor="middle" font-size="17" font-weight="700" fill="#047857">已配置</text>
    <text x="402" y="313" class="label">接口地址</text>
    <rect x="68" y="328" width="308" height="58" rx="12" class="field"/>
    <rect x="402" y="328" width="308" height="58" rx="12" class="field"/>
    <text x="88" y="366" class="value">qwen3.6-flash</text>
    <text x="422" y="366" font-size="19" fill="#334155">dashscope.aliyuncs.com/…</text>
    <path d="M346 351l9 9 9-9" fill="none" stroke="#64748b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <text x="68" y="425" class="label">API 密钥</text>
    <rect x="68" y="440" width="642" height="58" rx="12" class="field"/>
    <text x="88" y="479" font-size="28" letter-spacing="4" fill="#64748b">••••••••••••••</text>
    <path d="M657 469s12-14 25-14 25 14 25 14-12 14-25 14-25-14-25-14Z" fill="none" stroke="#64748b" stroke-width="2.5"/>
    <circle cx="682" cy="469" r="6" fill="none" stroke="#64748b" stroke-width="2.5"/>

    <text x="68" y="538" class="label">模型配置</text>
    <rect x="674" y="513" width="36" height="36" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <path d="M692 522v18m-9-9h18" stroke="#475569" stroke-width="2.5" stroke-linecap="round"/>
    <rect x="68" y="552" width="642" height="64" rx="12" fill="#f8fafc" stroke="#dbe3ed" stroke-width="2"/>
    <circle cx="94" cy="584" r="9" fill="#2563eb"/>
    <text x="116" y="578" font-size="21" font-weight="700">Qwen 3.6 Flash</text>
    <text x="116" y="603" font-size="17" fill="#64748b">阿里云百炼 · dashscope.aliyuncs.com</text>
    <rect x="584" y="568" width="104" height="32" rx="7" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="2"/>
    <text x="636" y="591" text-anchor="middle" font-size="17" font-weight="700" fill="#047857">配置成功</text>

    <text x="68" y="655" class="label">术语偏好</text>
    <rect x="68" y="670" width="642" height="82" rx="12" class="field"/>
    <text x="88" y="705" font-size="20" fill="#475569">prompt=提示词；fine-tuning=微调；Copilot 不翻译</text>

    <text x="68" y="793" class="label">速度模式</text>
    <text x="402" y="793" class="label">翻译风格</text>
    <rect x="68" y="808" width="308" height="58" rx="12" class="field"/>
    <rect x="402" y="808" width="308" height="58" rx="12" class="field"/>
    <text x="88" y="846" class="value">精准</text>
    <text x="422" y="846" class="value">技术文档</text>
    <path d="M346 831l9 9 9-9" fill="none" stroke="#64748b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M680 831l9 9 9-9" fill="none" stroke="#64748b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <text x="68" y="894" font-size="18" font-weight="650">启用缓存</text>
    <rect x="316" y="875" width="50" height="29" rx="15" fill="#2563eb"/>
    <circle cx="350" cy="890" r="11" fill="#ffffff"/>
    <text x="402" y="894" font-size="18" font-weight="650">自动术语表</text>
    <rect x="650" y="875" width="50" height="29" rx="15" fill="#2563eb"/>
    <circle cx="684" cy="890" r="11" fill="#ffffff"/>
    <text x="68" y="925" font-size="18" font-weight="650">划词按钮</text>
    <rect x="316" y="906" width="50" height="29" rx="15" fill="#2563eb"/>
    <circle cx="350" cy="921" r="11" fill="#ffffff"/>
    <text x="402" y="925" font-size="18" font-weight="650">页面摘要</text>
    <rect x="650" y="906" width="50" height="29" rx="15" fill="#2563eb"/>
    <circle cx="684" cy="921" r="11" fill="#ffffff"/>

    <rect x="42" y="960" width="218" height="64" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="281" y="960" width="218" height="64" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="520" y="960" width="218" height="64" rx="14" fill="#2563eb"/>
    <path d="M75 991l10 10 19-22" fill="none" stroke="#334155" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M314 980h22m-16 11h16m-22 11h22" stroke="#334155" stroke-width="3" stroke-linecap="round"/>
    <path d="M550 980h20m-10-10v10c0 11-6 21-14 26m7-14c4 5 9 8 17 10m22 5 12-29 12 29m-19-11h14" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="166" y="1001" text-anchor="middle" class="buttonText" fill="#273244">保存设置</text>
    <text x="405" y="1001" text-anchor="middle" class="buttonText" fill="#273244">翻译选中</text>
    <text x="644" y="1001" text-anchor="middle" class="buttonText" fill="#ffffff">翻译页面</text>

    <text x="390" y="1062" text-anchor="middle" font-size="18" fill="#64748b">示例配置，不含真实 API 密钥</text>
  </g>
</svg>

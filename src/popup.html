<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>上下文翻译助手</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body data-provider="custom">
    <main class="shell">
      <header class="app-header">
        <div class="brand">
          <div class="logo-mark" aria-hidden="true">
            <img src="../assets/icon-128.png" alt="">
          </div>
          <div>
            <h1>上下文翻译助手</h1>
            <p>先理解网页语境，再翻译正文。</p>
          </div>
        </div>
        <button class="icon-button" id="restorePage" data-action="show-original" data-available="false" title="暂无可切换的译文" aria-label="暂无可切换的译文" type="button" disabled>
          <svg class="restore-original-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 7v6h6"></path>
            <path d="M21 17a9 9 0 0 0-15-6.7L3 13"></path>
          </svg>
          <svg class="restore-translation-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M21 7v6h-6"></path>
            <path d="M3 17a9 9 0 0 1 15-6.7L21 13"></path>
          </svg>
        </button>
      </header>

      <section class="panel">
        <div class="grid-2 compact-grid">
          <div class="section">
            <label for="provider">翻译服务</label>
            <div class="select-shell ui-select">
              <select id="provider">
                <option value="auto">Auto</option>
                <option value="custom" selected>自定义兼容接口</option>
              </select>
            </div>
          </div>

          <div class="section">
            <label for="targetLanguage">翻译为</label>
            <div class="select-shell ui-select">
              <select id="targetLanguage">
                <option>简体中文</option>
                <option>繁体中文</option>
                <option>英语</option>
              </select>
            </div>
          </div>
        </div>

        <div class="separator" role="separator" aria-orientation="horizontal"></div>

        <div class="provider-config" data-provider-config>
          <div class="grid-2">
            <div class="section">
              <div class="field-label-row">
                <label id="modelLabel" for="model">模型</label>
                <span id="modelConfiguredBadge" class="configured-badge" hidden>已配置</span>
              </div>
              <div class="model-field">
                <input id="model" type="text" autocomplete="off">
                <button id="toggleModelPicker" class="model-picker-trigger" type="button" aria-controls="modelPicker" aria-expanded="false" aria-label="选择常见模型" title="选择常见模型">
                  <span class="assistant-select-chevron" aria-hidden="true"></span>
                </button>
                <div id="modelPicker" class="model-picker" role="dialog" aria-label="常见模型" hidden>
                  <details class="model-group" data-endpoint="https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions">
                    <summary>阿里云百炼</summary>
                    <div class="model-options">
                      <button class="model-option" type="button" data-model="qwen3.7-max">
                        <span>Qwen 3.7 Max</span>
                        <code>qwen3.7-max</code>
                      </button>
                      <button class="model-option" type="button" data-model="qwen3.7-plus">
                        <span>Qwen 3.7 Plus</span>
                        <code>qwen3.7-plus</code>
                      </button>
                      <button class="model-option" type="button" data-model="qwen3.6-flash">
                        <span>Qwen 3.6 Flash</span>
                        <code>qwen3.6-flash</code>
                      </button>
                      <button class="model-option" type="button" data-model="qwen3.6-plus">
                        <span>Qwen 3.6 Plus</span>
                        <code>qwen3.6-plus</code>
                      </button>
                    </div>
                  </details>
                  <details class="model-group" data-endpoint="https://api.deepseek.com/chat/completions">
                    <summary>DeepSeek</summary>
                    <div class="model-options">
                      <button class="model-option" type="button" data-model="deepseek-v4-pro">
                        <span>DeepSeek V4 Pro</span>
                        <code>deepseek-v4-pro</code>
                      </button>
                      <button class="model-option" type="button" data-model="deepseek-v4-flash">
                        <span>DeepSeek V4 Flash</span>
                        <code>deepseek-v4-flash</code>
                      </button>
                    </div>
                  </details>
                  <details class="model-group" data-endpoint="https://api.openai.com/v1/chat/completions">
                    <summary>OpenAI</summary>
                    <div class="model-options">
                      <button class="model-option" type="button" data-model="gpt-5.6">
                        <span>GPT-5.6</span>
                        <code>gpt-5.6</code>
                      </button>
                      <button class="model-option" type="button" data-model="gpt-5.6-terra">
                        <span>GPT-5.6 Terra</span>
                        <code>gpt-5.6-terra</code>
                      </button>
                      <button class="model-option" type="button" data-model="gpt-5.6-luna">
                        <span>GPT-5.6 Luna</span>
                        <code>gpt-5.6-luna</code>
                      </button>
                    </div>
                  </details>
                  <details class="model-group" data-endpoint="https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions">
                    <summary>其他常见模型</summary>
                    <div class="model-options">
                      <button class="model-option" type="button" data-model="glm-5.2">
                        <span>GLM 5.2</span>
                        <code>glm-5.2</code>
                      </button>
                      <button class="model-option" type="button" data-model="kimi-k2.6">
                        <span>Kimi K2.6</span>
                        <code>kimi-k2.6</code>
                      </button>
                      <button class="model-option" type="button" data-model="MiniMax-M3">
                        <span>MiniMax M3</span>
                        <code>MiniMax-M3</code>
                      </button>
                    </div>
                  </details>
                  <div id="customModelEntry" class="custom-model-entry">
                    <div class="custom-model-heading">
                      <label for="customModelName">自定义模型名称</label>
                      <span id="customModelConfiguredBadge" class="configured-badge" hidden>已配置</span>
                    </div>
                    <div class="custom-model-controls">
                      <input id="customModelName" type="text" autocomplete="off" placeholder="请输入模型名称">
                      <button id="applyCustomModel" type="button" disabled>使用</button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <div class="section">
              <label for="endpoint">接口地址</label>
              <input id="endpoint" type="url" autocomplete="off">
            </div>
          </div>

          <div class="section">
            <label id="apiKeyLabel" for="apiKey">API 密钥</label>
            <div class="secret-field">
              <input id="apiKey" type="password" autocomplete="off" placeholder="sk-...">
              <button id="toggleApiKey" class="icon-button field-icon" type="button" aria-controls="apiKey" aria-pressed="false" aria-label="显示 API 密钥" title="显示 API 密钥" data-visible="false">
                <svg class="icon-eye" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
                <svg class="icon-eye-off" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M10.7 5.1A10.9 10.9 0 0 1 12 5c6.5 0 10 7 10 7a18.6 18.6 0 0 1-2.1 3.1"></path>
                  <path d="M14.1 14.1A3 3 0 0 1 9.9 9.9"></path>
                  <path d="M3 3l18 18"></path>
                  <path d="M6.4 6.4C3.6 8.3 2 12 2 12s3.5 7 10 7a10.8 10.8 0 0 0 4.2-.9"></path>
                </svg>
              </button>
            </div>
          </div>

          <div class="section model-config-library">
            <div class="field-label-row">
              <label id="modelConfigListLabel">模型配置</label>
              <button id="addModelConfig" class="icon-button compact-icon-button" type="button" aria-label="新增模型配置" title="新增模型配置">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 5v14"></path>
                  <path d="M5 12h14"></path>
                </svg>
              </button>
            </div>
            <div id="modelConfigList" class="model-config-list" role="radiogroup" aria-labelledby="modelConfigListLabel"></div>
          </div>
        </div>

        <div class="section">
          <label for="glossary">术语偏好</label>
          <textarea id="glossary" rows="2" placeholder="prompt=提示词；fine-tuning=微调；Copilot 不翻译"></textarea>
        </div>

        <div class="grid-2 compact-grid">
          <div class="section">
            <label for="speedMode">速度模式</label>
            <div class="select-shell ui-select">
              <select id="speedMode" title="极速更快，精准更重视上下文">
                <option value="fast">极速</option>
                <option value="accurate">精准</option>
              </select>
            </div>
          </div>

          <div class="section">
            <label for="translationStyle">翻译风格</label>
            <div class="select-shell ui-select">
              <select id="translationStyle">
                <option value="general">通用自然</option>
                <option value="technical">技术文档</option>
                <option value="business">正式商务</option>
                <option value="casual">自然口语</option>
                <option value="academic">学术论文</option>
                <option value="product">产品介绍</option>
              </select>
            </div>
          </div>
        </div>

        <div class="separator" role="separator" aria-orientation="horizontal"></div>

        <div class="grid-2 options-grid">
          <div class="section toggle-section" aria-label="效率选项">
            <label class="switch-row">
              <span>启用缓存</span>
              <input id="enableCache" class="switch-input" type="checkbox">
              <span class="switch-control" aria-hidden="true"></span>
            </label>
            <label class="switch-row">
              <span>划词按钮</span>
              <input id="showSelectionButton" class="switch-input" type="checkbox">
              <span class="switch-control" aria-hidden="true"></span>
            </label>
          </div>
          <div class="section toggle-section" aria-label="准确率选项">
            <label class="switch-row">
              <span>自动术语表</span>
              <input id="enableGlossaryExtraction" class="switch-input" type="checkbox">
              <span class="switch-control" aria-hidden="true"></span>
            </label>
            <label class="switch-row">
              <span>页面摘要</span>
              <input id="enablePageSummary" class="switch-input" type="checkbox">
              <span class="switch-control" aria-hidden="true"></span>
            </label>
          </div>
        </div>
      </section>

      <div class="actions" aria-label="翻译操作">
        <button id="saveSettings" class="secondary action-button" type="button" title="保存当前服务、语言、术语和风格设置" aria-label="保存当前设置">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20 6 9 17l-5-5"></path>
          </svg>
          <span>保存设置</span>
        </button>
        <button id="translateSelection" class="secondary action-button" type="button" title="翻译当前网页中已选中的文字" aria-label="翻译选中文本">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 7h16"></path>
            <path d="M8 12h8"></path>
            <path d="M6 17h12"></path>
          </svg>
          <span>翻译选中</span>
        </button>
        <button id="translatePage" class="primary action-button" type="button" title="翻译当前网页可读文本" aria-label="翻译当前页面">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 8h8"></path>
            <path d="M9 4v4c0 4-2 7-5 9"></path>
            <path d="M7 13c1 2 3 3 6 4"></path>
            <path d="M16 20l4-9 4 9"></path>
            <path d="M18 16h4"></path>
          </svg>
          <span>翻译页面</span>
        </button>
      </div>

      <p class="status" id="status" role="status"></p>
    </main>
    <script src="shared.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
